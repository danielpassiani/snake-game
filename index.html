<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Jogo da Cobrinha</title>
  <style>
    /* Centraliza o canvas na tela */
    html,body{
      height:100%;
      margin:0;
    }
    body{
      display:flex;
      align-items:center;
      justify-content:center;
      background:#0b0f13; /* fundo escuro da página */
      font-family:Arial, Helvetica, sans-serif;
      color:#eee;
      flex-direction:column;
    }

    /* Placar acima do canvas */
    #scoreBoard{
      margin-bottom:12px;
      font-size:20px;
      font-weight:700;
      letter-spacing:1px;
    }

    /* Controles do jogo (velocidade, pausar, reiniciar) */
    #controls{
      display:flex;
      gap:8px;
      margin-bottom:8px;
      align-items:center;
    }
    #controls select, #controls button{
      background:#0f1620;
      color:#eee;
      border:1px solid #222;
      padding:6px 8px;
      cursor:pointer;
    }

    /* Canvas 400x400 com borda visível */
    canvas{
      width:400px;
      height:400px;
      border:4px solid #222;
      background:#071018; /* tom escuro do canvas */
      box-shadow:0 6px 20px rgba(0,0,0,0.7), inset 0 0 30px rgba(255,255,255,0.02);
      image-rendering: pixelated;
    }

    /* Texto de instruções pequeno */
    .hint{
      margin-top:10px;
      opacity:0.8;
      font-size:12px;
    }
  </style>
</head>
<body>
  <div id="scoreBoard">Placar: 0</div>
  <div id="controls">
    <label for="speed" style="font-size:14px">Velocidade:</label>
    <select id="speed">
      <option value="150">Lento</option>
      <option value="100" selected>Normal</option>
      <option value="70">Rápido</option>
    </select>
    <button id="pauseBtn">Pausar</button>
    <button id="restartBtn">Reiniciar</button>
  </div>
  <canvas id="game" width="400" height="400"></canvas>
  <div class="hint">Use as setas do teclado (Arrow Keys) para controlar a cobrinha.</div>

  <script>
    // Seleção de elementos do DOM
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const scoreBoard = document.getElementById('scoreBoard');

    // Configurações do jogo
    const CELL_SIZE = 20; // Tamanho de cada célula (pixels)
    const COLS = canvas.width / CELL_SIZE; // 20 colunas
    const ROWS = canvas.height / CELL_SIZE; // 20 linhas
    let TICK = 100; // intervalo do loop em ms (padrão)

    let snake = []; // array de segmentos {x,y}
    let direction = 'right'; // direção atual
    let nextDirection = 'right'; // direção solicitada (para prevenir reversão instantânea)
    let food = {x:0,y:0};
    let score = 0;
    let gameInterval = null;
    let paused = false;
    // Audio context para efeitos sonoros simples
    const AudioCtx = window.AudioContext || window.webkitAudioContext;
    const audioCtx = AudioCtx ? new AudioCtx() : null;

    // Elementos de controle
    const speedSelect = document.getElementById('speed');
    const pauseBtn = document.getElementById('pauseBtn');
    const restartBtn = document.getElementById('restartBtn');

    // Ajusta a velocidade a partir do select
    speedSelect.addEventListener('change', (e) => {
      const val = Number(e.target.value);
      setSpeed(val);
    });

    // Pausa / Resume
    pauseBtn.addEventListener('click', () => {
      togglePause();
    });

    // Reiniciar jogo manualmente
    restartBtn.addEventListener('click', () => {
      init();
    });

    // Inicializa o jogo
    function init(){
      // Começa com 5 blocos no centro indo para a direita
      const startX = Math.floor(COLS/2);
      const startY = Math.floor(ROWS/2);
      snake = [];
      for(let i=0;i<5;i++){
        snake.push({x:startX - i, y:startY});
      }
      direction = 'right';
      nextDirection = 'right';
      score = 0;
      updateScore();
      spawnFood();
      // limpa qualquer intervalo anterior
      if(gameInterval) clearInterval(gameInterval);
      // inicia o loop do jogo
      paused = false;
      pauseBtn.textContent = 'Pausar';
      if(gameInterval) clearInterval(gameInterval);
      gameInterval = setInterval(gameLoop, TICK);
    }

    // Atualiza o placar exibido
    function updateScore(){
      scoreBoard.textContent = 'Placar: ' + score;
    }

    // Gera uma posição aleatória para a comida que não colida com a cobrinha
    function spawnFood(){
      let valid = false;
      let x,y;
      while(!valid){
        x = Math.floor(Math.random() * COLS);
        y = Math.floor(Math.random() * ROWS);
        valid = !snake.some(s => s.x === x && s.y === y);
      }
      food = {x,y};
    }

    // Toca um tom simples usando WebAudio (se disponível)
    function playTone(freq, duration = 0.05, type = 'sine'){
      if(!audioCtx) return;
      const o = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      o.type = type;
      o.frequency.value = freq;
      o.connect(g);
      g.connect(audioCtx.destination);
      g.gain.setValueAtTime(0.0001, audioCtx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.2, audioCtx.currentTime + 0.01);
      o.start();
      g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
      o.stop(audioCtx.currentTime + duration + 0.02);
    }

    // Sons para comer e game over
    function playEatSound(){
      playTone(880, 0.05, 'sine');
      setTimeout(() => playTone(1320, 0.04, 'sine'), 60);
    }
    function playGameOverSound(){
      playTone(200, 0.2, 'sawtooth');
      setTimeout(() => playTone(120, 0.18, 'sawtooth'), 180);
    }

    // Função principal do loop: atualiza o estado e desenha a cena
    function gameLoop(){
      // Atualiza direção (aplica a próxima direção solicitada)
      direction = nextDirection;
      // Move a cobrinha
      update();
      // Desenha o jogo
      draw();
    }

    // Atualiza posição da cobrinha, trata alimentação e colisões
    function update(){
      const head = snake[0];
      let newHead = {x: head.x, y: head.y};

      // Calcula nova posição da cabeça conforme direção
      if(direction === 'right') newHead.x++;
      else if(direction === 'left') newHead.x--;
      else if(direction === 'up') newHead.y--;
      else if(direction === 'down') newHead.y++;

      // Verifica colisão com paredes
      if(newHead.x < 0 || newHead.x >= COLS || newHead.y < 0 || newHead.y >= ROWS){
        return gameOver();
      }

      // Verifica colisão com o próprio corpo
      if(snake.some(segment => segment.x === newHead.x && segment.y === newHead.y)){
        return gameOver();
      }

      // Adiciona nova cabeça ao começo do array
      snake.unshift(newHead);

      // Se comeu a comida, aumenta pontuação e gera nova comida (cresce automaticamente por não remover a cauda)
      if(newHead.x === food.x && newHead.y === food.y){
        score += 10;
        updateScore();
        spawnFood();
        playEatSound();
      } else {
        // Caso não tenha comido, remove o último segmento (movimento normal)
        snake.pop();
      }
    }

    // Desenha cobrinha, comida e fundo
    function draw(){
      // Limpa o canvas e desenha o fundo escuro
      ctx.fillStyle = '#071018';
      ctx.fillRect(0,0,canvas.width,canvas.height);

      // Desenha a comida (maçã) como bloco vermelho
      ctx.fillStyle = '#e53935';
      ctx.fillRect(food.x * CELL_SIZE, food.y * CELL_SIZE, CELL_SIZE, CELL_SIZE);

      // Desenha a cobrinha como blocos verdes
      ctx.fillStyle = '#2ecc71';
      for(let i=0;i<snake.length;i++){
        const s = snake[i];
        ctx.fillRect(s.x * CELL_SIZE, s.y * CELL_SIZE, CELL_SIZE, CELL_SIZE);
      }
    }

    // Aciona Game Over: mostra alert com pontuação e reinicia o jogo
    function gameOver(){
      clearInterval(gameInterval);
      playGameOverSound();
      // Exibe pontuação final e reinicia automaticamente
      alert('Game Over! Sua pontuação: ' + score);
      init();
    }

    // Trata eventos de teclado para controlar a direção da cobrinha
    window.addEventListener('keydown', function(e){
      // Previne scroll com as setas
      if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)){
        e.preventDefault();
      }

      // Define a direção solicitada, impedindo reversão instantânea
      if(e.key === 'ArrowUp' && direction !== 'down'){
        nextDirection = 'up';
      } else if(e.key === 'ArrowDown' && direction !== 'up'){
        nextDirection = 'down';
      } else if(e.key === 'ArrowLeft' && direction !== 'right'){
        nextDirection = 'left';
      } else if(e.key === 'ArrowRight' && direction !== 'left'){
        nextDirection = 'right';
      }
    });

    // Define nova velocidade em ms e reinicia intervalo se necessário
    function setSpeed(ms){
      TICK = ms;
      if(!paused){
        if(gameInterval) clearInterval(gameInterval);
        gameInterval = setInterval(gameLoop, TICK);
      }
    }

    // Alterna entre pausar e continuar o jogo
    function togglePause(){
      if(paused){
        // retomar
        paused = false;
        pauseBtn.textContent = 'Pausar';
        if(gameInterval) clearInterval(gameInterval);
        gameInterval = setInterval(gameLoop, TICK);
      } else {
        // pausar
        paused = true;
        pauseBtn.textContent = 'Continuar';
        if(gameInterval) clearInterval(gameInterval);
      }
    }

    // Inicializa o jogo ao carregar a página
    init();

    /*
      Comentários resumidos (PT-BR):
      - init(): inicializa variáveis, gera comida e inicia o intervalo do jogo.
      - spawnFood(): posiciona a comida aleatoriamente, garantindo que não apareça sobre a cobrinha.
      - gameLoop(): chamado a cada TICK ms; aplica a direção solicitada, atualiza estado e redesenha.
      - update(): calcula nova posição da cabeça, checa colisões, trata alimentação e crescimento.
      - draw(): limpa o canvas e desenha a comida e cada segmento da cobrinha.
      - gameOver(): para o loop, mostra um alert com a pontuação final e reinicia o jogo.
    */
  </script>
</body>
</html>
